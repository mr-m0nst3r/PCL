id: rfc5280
version: 1.0

rules:

  # -------------------------------------------------
  # Certificate structure (Section 4.1)
  # -------------------------------------------------

  # Version MUST be 3 when extensions are present
  - id: version-v3-when-extensions
    reference: RFC5280 4.1.2.1
    when:
      target: certificate.extensions
      operator: present
    target: certificate.version
    operator: eq
    operands: [3]
    severity: error

  # Version SHOULD be 2 when UniqueIdentifier present but no extensions
  - id: version-v2-when-unique-id
    reference: RFC5280 4.1.2.1
    when:
      target: certificate.issuerUniqueID
      operator: present
    target: certificate.version
    operator: gte
    operands: [2]
    severity: warning

  - id: version-v2-when-subject-unique-id
    reference: RFC5280 4.1.2.1
    when:
      target: certificate.subjectUniqueID
      operator: present
    target: certificate.version
    operator: gte
    operands: [2]
    severity: warning

  - id: serial-number-present
    reference: RFC5280 4.1.2.2
    target: certificate.serialNumber
    operator: present
    severity: error

  - id: serial-number-positive
    reference: RFC5280 4.1.2.2
    target: certificate.serialNumber.value
    operator: positive
    severity: error

  - id: serial-number-unique
    reference: RFC5280 4.1.2.2
    target: certificate
    operator: serialNumberUnique
    severity: error

  - id: serial-number-length
    reference: RFC5280 4.1.2.2
    target: certificate.serialNumber
    operator: maxLength
    operands: [20]
    severity: error

  - id: signature-algorithm-matches-tbs
    reference: RFC5280 4.1.2.3
    target: certificate
    operator: signatureAlgorithmMatchesTBS
    severity: error

  - id: signature-valid
    reference: RFC5280 4.1.2.3
    target: certificate
    operator: signatureValid
    severity: error


  # -------------------------------------------------
  # Issuer / Subject (Section 4.1.2.4, 4.1.2.6)
  # -------------------------------------------------

  - id: issuer-not-empty
    reference: RFC5280 4.1.2.4
    target: certificate.issuer
    operator: notEmpty
    severity: error

  - id: subject-not-empty-for-ca
    reference: RFC5280 4.1.2.6
    target: certificate.subject
    operator: notEmpty
    appliesTo: [root, intermediate]
    severity: error

  - id: issuer-matches-subject-for-root
    reference: RFC5280 6
    target: certificate
    operator: issuedBy
    appliesTo: [root]
    severity: error


  # -------------------------------------------------
  # Validity (Section 4.1.2.5)
  # -------------------------------------------------

  - id: not-expired
    reference: RFC5280 4.1.2.5
    target: certificate.validity.notAfter
    operator: after
    severity: error

  - id: not-yet-valid
    reference: RFC5280 4.1.2.5
    target: certificate.validity.notBefore
    operator: before
    severity: error

  - id: validity-order-correct
    reference: RFC5280 4.1.2.5
    target: certificate
    operator: validityOrderCorrect
    severity: error


  # -------------------------------------------------
  # Unique Identifiers (Section 4.1.2.8)
  # -------------------------------------------------

  - id: no-unique-identifiers
    reference: RFC5280 4.1.2.8
    target: certificate
    operator: noUniqueIdentifiers
    severity: error


  # -------------------------------------------------
  # Extensions (Section 4.2)
  # -------------------------------------------------

  - id: no-unknown-critical-extensions
    reference: RFC5280 6
    target: certificate
    operator: noUnknownCriticalExtensions
    severity: error


  # -------------------------------------------------
  # Authority Key Identifier (Section 4.2.1.1)
  # -------------------------------------------------

  - id: authority-key-identifier-present
    reference: RFC5280 4.2.1.1
    target: certificate.authorityKeyIdentifier
    operator: present
    appliesTo: [leaf, intermediate]
    severity: warning

  - id: aki-not-critical
    reference: RFC5280 4.2.1.1
    when:
      target: certificate.authorityKeyIdentifier
      operator: present
    target: certificate.extensions.authorityKeyIdentifier.critical
    operator: eq
    operands: [false]
    severity: error

  - id: aki-matches-ski
    reference: RFC5280 4.2.1.1
    target: certificate
    operator: akiMatchesSki
    severity: warning


  # -------------------------------------------------
  # Subject Key Identifier (Section 4.2.1.2)
  # -------------------------------------------------

  - id: subject-key-identifier-present
    reference: RFC5280 4.2.1.2
    target: certificate.subjectKeyIdentifier
    operator: present
    appliesTo: [root, intermediate]
    severity: warning

  - id: ski-not-critical
    reference: RFC5280 4.2.1.2
    when:
      target: certificate.extensions.subjectKeyIdentifier
      operator: present
    target: certificate.extensions.subjectKeyIdentifier.critical
    operator: eq
    operands: [false]
    severity: error


  # -------------------------------------------------
  # Key Usage (Section 4.2.1.3)
  # -------------------------------------------------

  - id: key-usage-present
    reference: RFC5280 4.2.1.3
    target: certificate.keyUsage
    operator: present
    severity: warning

  - id: key-usage-critical-for-ca
    reference: RFC5280 4.2.1.3
    when:
      target: certificate.basicConstraints.cA
      operator: eq
      operands: [true]
    target: certificate.extensions.keyUsage.critical
    operator: eq
    operands: [true]
    severity: warning

  - id: ca-key-cert-sign
    reference: RFC5280 4.2.1.3
    target: certificate.keyUsage.keyCertSign
    operator: eq
    operands: [true]
    appliesTo: [root, intermediate]
    severity: error

  - id: leaf-key-usage-valid
    reference: RFC5280 4.2.1.3
    target: certificate
    operator: keyUsageLeaf
    appliesTo: [leaf]
    severity: error


  # -------------------------------------------------
  # Policy Mappings (Section 4.2.1.5)
  # -------------------------------------------------

  - id: policy-mappings-critical
    reference: RFC5280 4.2.1.5
    when:
      target: certificate.extensions.2.5.29.33
      operator: present
    target: certificate.extensions.2.5.29.33.critical
    operator: eq
    operands: [true]
    severity: error


  # -------------------------------------------------
  # Subject Alternative Name (Section 4.2.1.6)
  # -------------------------------------------------

  - id: san-required-if-empty-subject
    reference: RFC5280 4.2.1.6
    target: certificate
    operator: sanRequiredIfEmptySubject
    appliesTo: [leaf]
    severity: error

  - id: san-critical-if-subject-empty
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subject
      operator: isEmpty
    target: certificate.extensions.subjectAltName.critical
    operator: eq
    operands: [true]
    severity: error


  # -------------------------------------------------
  # Issuer Alternative Name (Section 4.2.1.7)
  # -------------------------------------------------

  - id: ian-not-critical
    reference: RFC5280 4.2.1.7
    when:
      target: certificate.extensions.2.5.29.18
      operator: present
    target: certificate.extensions.2.5.29.18.critical
    operator: eq
    operands: [false]
    severity: warning


  # -------------------------------------------------
  # Subject Directory Attributes (Section 4.2.1.8)
  # -------------------------------------------------

  - id: subject-directory-attributes-not-critical
    reference: RFC5280 4.2.1.8
    when:
      target: certificate.extensions.2.5.29.9
      operator: present
    target: certificate.extensions.2.5.29.9.critical
    operator: eq
    operands: [false]
    severity: error


  # -------------------------------------------------
  # Basic Constraints (Section 4.2.1.9)
  # -------------------------------------------------

  - id: basic-constraints-present
    reference: RFC5280 4.2.1.9
    target: certificate.basicConstraints
    operator: present
    appliesTo: [root, intermediate]
    severity: error

  - id: basic-constraints-critical-for-ca
    reference: RFC5280 4.2.1.9
    when:
      target: certificate.basicConstraints.cA
      operator: eq
      operands: [true]
    target: certificate.extensions.basicConstraints.critical
    operator: eq
    operands: [true]
    severity: error

  - id: ca-basic-constraints
    reference: RFC5280 4.2.1.9
    target: certificate.basicConstraints.cA
    operator: eq
    operands: [true]
    appliesTo: [root, intermediate]
    severity: error

  - id: leaf-not-ca
    reference: RFC5280 4.2.1.9
    target: certificate.basicConstraints.cA
    operator: neq
    operands: [true]
    appliesTo: [leaf]
    severity: error

  - id: ca-path-len-valid
    reference: RFC5280 4.2.1.9
    target: certificate
    operator: pathLenValid
    appliesTo: [root, intermediate]
    severity: error


  # -------------------------------------------------
  # Name Constraints (Section 4.2.1.10)
  # -------------------------------------------------

  - id: name-constraints-critical
    reference: RFC5280 4.2.1.10
    when:
      target: certificate.nameConstraints
      operator: present
    target: certificate.extensions.nameConstraints.critical
    operator: eq
    operands: [true]
    severity: error

  - id: name-constraints-valid
    reference: RFC5280 4.2.1.10
    target: certificate
    operator: nameConstraintsValid
    severity: error


  # -------------------------------------------------
  # Certificate Policies (Section 4.2.1.4)
  # -------------------------------------------------

  # Policy validation is use-case dependent - uncomment and specify required policies:
  # - id: certificate-policy-valid
  #   target: certificate
  #   operator: certificatePolicyValid
  #   operands: ["2.5.29.32.0"]  # anyPolicy, or specific policy OIDs
  #   severity: error


  # -------------------------------------------------
  # Policy Constraints (Section 4.2.1.11)
  # -------------------------------------------------

  - id: policy-constraints-critical
    reference: RFC5280 4.2.1.11
    when:
      target: certificate.extensions.2.5.29.36
      operator: present
    target: certificate.extensions.2.5.29.36.critical
    operator: eq
    operands: [true]
    severity: error


  # -------------------------------------------------
  # Inhibit anyPolicy (Section 4.2.1.14)
  # -------------------------------------------------

  - id: inhibit-any-policy-critical
    reference: RFC5280 4.2.1.14
    when:
      target: certificate.extensions.2.5.29.54
      operator: present
    target: certificate.extensions.2.5.29.54.critical
    operator: eq
    operands: [true]
    severity: error


  # -------------------------------------------------
  # Freshest CRL (Section 4.2.1.15)
  # -------------------------------------------------

  - id: freshest-crl-not-critical
    reference: RFC5280 4.2.1.15
    when:
      target: certificate.extensions.2.5.29.46
      operator: present
    target: certificate.extensions.2.5.29.46.critical
    operator: eq
    operands: [false]
    severity: error


  # -------------------------------------------------
  # Authority Information Access (Section 4.2.2.1)
  # -------------------------------------------------

  - id: aia-not-critical
    reference: RFC5280 4.2.2.1
    when:
      target: certificate.extensions.1.3.6.1.5.5.7.1.1
      operator: present
    target: certificate.extensions.1.3.6.1.5.5.7.1.1.critical
    operator: eq
    operands: [false]
    severity: error

  # CA Issuers MUST be DER or BER encoded (PEM is not RFC compliant)
  # RFC 5280 4.2.2.1: "If the information is available via HTTP or FTP, then the
  # URI MUST point to either a single DER-encoded certificate or a
  # DER-encoded PKCS#7 certificate bundle."
  - id: ca-issuers-der-format
    reference: RFC5280 4.2.2.1
    when:
      target: certificate.downloadFormat
      operator: present
    target: certificate.downloadFormat
    operator: neq
    operands: ["PEM"]
    severity: warning


  # -------------------------------------------------
  # Subject Information Access (Section 4.2.2.2)
  # -------------------------------------------------

  - id: sia-not-critical
    reference: RFC5280 4.2.2.2
    when:
      target: certificate.extensions.1.3.6.1.5.5.7.1.11
      operator: present
    target: certificate.extensions.1.3.6.1.5.5.7.1.11.critical
    operator: eq
    operands: [false]
    severity: error


  # -------------------------------------------------
  # CRL Profile (Section 5)
  # -------------------------------------------------

  - id: crl-valid
    reference: RFC5280 5.1
    when:
      target: crl
      operator: present
    target: crl
    operator: crlValid
    severity: error

  - id: crl-not-expired
    reference: RFC5280 5.1
    when:
      target: crl
      operator: present
    target: crl
    operator: crlNotExpired
    severity: error

  - id: crl-signed-by
    reference: RFC5280 5.1
    when:
      target: crl
      operator: present
    target: crl
    operator: crlSignedBy
    severity: error

  - id: cert-not-revoked
    reference: RFC5280 5.1
    when:
      target: crl
      operator: present
    target: certificate
    operator: notRevoked
    severity: error

  - id: crl-aki-not-critical
    reference: RFC5280 5.2
    when:
      target: crl.authorityKeyIdentifier
      operator: present
    target: crl.authorityKeyIdentifier.critical
    operator: eq
    operands: [false]
    severity: error

  - id: crl-number-not-critical
    reference: RFC5280 5.2
    when:
      target: crl.extensions.2.5.29.20
      operator: present
    target: crl.extensions.2.5.29.20.critical
    operator: eq
    operands: [false]
    severity: error

  - id: crl-delta-indicator-critical
    reference: RFC5280 5.2
    when:
      target: crl.extensions.2.5.29.27
      operator: present
    target: crl.extensions.2.5.29.27.critical
    operator: eq
    operands: [true]
    severity: error

  - id: crl-idp-critical
    reference: RFC5280 5.2
    when:
      target: crl.extensions.2.5.29.28
      operator: present
    target: crl.extensions.2.5.29.28.critical
    operator: eq
    operands: [true]
    severity: error

  # No unknown critical CRL extensions (RFC 5280 5.2)
  - id: crl-no-unknown-critical-extensions
    reference: RFC5280 5.2
    when:
      target: crl.extensions
      operator: present
    target: crl
    operator: noUnknownCriticalExtensions
    severity: error

  # -------------------------------------------------
  # CRL Entry Extensions (Section 5.3)
  # -------------------------------------------------

  # Per RFC 5280 5.3.1, reasonCode extension (OID 2.5.29.21) is OPTIONAL
  # but recommended for better revocation information management.
  # This rule checks that all revoked entries have reason codes.
  - id: crl-entries-have-reason
    reference: RFC5280 5.3.1
    when:
      target: crl
      operator: present
    target: crl.revokedCertificates
    operator: every
    operands:
      - path: extensions.2.5.29.21
        check: present
    severity: warning

  # Validate that reason codes are within valid range (1-10, except 7)
  # Valid: 1(keyCompromise), 2(cACompromise), 3(affiliationChanged), 4(superseded),
  #        5(cessationOfOperation), 6(certHold), 8(removeFromCRL), 9(privilegeWithdrawn), 10(aACompromise)
  - id: crl-entry-reason-valid
    reference: RFC5280 5.3.1
    when:
      target: crl
      operator: present
    target: crl.revokedCertificates
    operator: every
    operands:
      - path: extensions.2.5.29.21.value
        check: in
        values: [1, 2, 3, 4, 5, 6, 8, 9, 10]
        skipMissing: true
    severity: error


  # -------------------------------------------------
  # OCSP (RFC 6960)
  # -------------------------------------------------

  - id: ocsp-valid
    reference: RFC6960
    when:
      target: ocsp
      operator: present
    target: certificate
    operator: ocspValid
    severity: error

  - id: ocsp-not-revoked
    reference: RFC6960
    when:
      target: ocsp
      operator: present
    target: certificate
    operator: notRevokedOCSP
    severity: error

  # -------------------------------------------------
  # Subject DN Field Length Limits (RFC 5280 Appendix A)
  # -------------------------------------------------

  # commonName max 64 characters (RFC 5280)
  - id: subject-cn-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.commonName
      operator: present
    target: certificate.subject.commonName
    operator: maxLength
    operands: [64]
    severity: error
    message: "commonName must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # organizationName max 64 characters (RFC 5280)
  - id: subject-org-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.organizationName
      operator: present
    target: certificate.subject.organizationName
    operator: maxLength
    operands: [64]
    severity: error
    message: "organizationName must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # organizationalUnitName max 64 characters (RFC 5280)
  - id: subject-ou-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.organizationalUnitName
      operator: present
    target: certificate.subject.organizationalUnitName
    operator: maxLength
    operands: [64]
    severity: error
    message: "organizationalUnitName must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # localityName max 128 characters (RFC 5280)
  - id: subject-locality-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.localityName
      operator: present
    target: certificate.subject.localityName
    operator: maxLength
    operands: [128]
    severity: error
    message: "localityName must not exceed 128 characters"
    appliesTo: [leaf, intermediate]

  # stateOrProvinceName max 128 characters (RFC 5280)
  - id: subject-state-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.stateOrProvinceName
      operator: present
    target: certificate.subject.stateOrProvinceName
    operator: maxLength
    operands: [128]
    severity: error
    message: "stateOrProvinceName must not exceed 128 characters"
    appliesTo: [leaf, intermediate]

  # countryName exactly 2 characters (ISO 3166-1)
  - id: subject-country-length
    reference: RFC5280 Appendix A.1 + ISO 3166-1
    when:
      target: certificate.subject.countryName
      operator: present
    target: certificate.subject.countryName
    operator: maxLength
    operands: [2]
    severity: error
    message: "countryName must be exactly 2 characters (ISO 3166-1)"
    appliesTo: [leaf, intermediate]

  - id: subject-country-min-length
    reference: RFC5280 Appendix A.1 + ISO 3166-1
    when:
      target: certificate.subject.countryName
      operator: present
    target: certificate.subject.countryName
    operator: minLength
    operands: [2]
    severity: error
    message: "countryName must be exactly 2 characters (ISO 3166-1)"
    appliesTo: [leaf, intermediate]

  # serialNumber (subject) max 64 characters (CABF BR)
  - id: subject-serial-number-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.serialNumber
      operator: present
    target: certificate.subject.serialNumber
    operator: maxLength
    operands: [64]
    severity: error
    message: "subject serialNumber must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # givenName max 64 characters (RFC 5280)
  - id: subject-givenname-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.givenName
      operator: present
    target: certificate.subject.givenName
    operator: maxLength
    operands: [64]
    severity: error
    message: "givenName must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # surname max 64 characters (RFC 5280)
  - id: subject-surname-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.surname
      operator: present
    target: certificate.subject.surname
    operator: maxLength
    operands: [64]
    severity: error
    message: "surname must not exceed 64 characters"
    appliesTo: [leaf, intermediate]

  # businessCategory max 128 characters (RFC 5280)
  - id: subject-business-category-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.businessCategory
      operator: present
    target: certificate.subject.businessCategory
    operator: maxLength
    operands: [128]
    severity: error
    message: "businessCategory must not exceed 128 characters"
    appliesTo: [leaf, intermediate]

  # emailAddress in subject max 255 characters (RFC 5280)
  - id: subject-email-max-length
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.emailAddress
      operator: present
    target: certificate.subject.emailAddress
    operator: maxLength
    operands: [255]
    severity: error
    message: "subject emailAddress must not exceed 255 characters"
    appliesTo: [leaf, intermediate]

  # emailAddress format validation (RFC 822)
  - id: subject-email-format
    reference: RFC5280 + RFC 822
    when:
      target: certificate.subject.emailAddress
      operator: present
    target: certificate.subject.emailAddress
    operator: regex
    operands: ["^[^@]+@[^@]+$"]
    severity: warning
    message: "subject emailAddress should be valid RFC 822 format"
    appliesTo: [leaf, intermediate]

  # SAN rfc822Name format validation (RFC 822)
  - id: san-rfc822-name-format
    reference: RFC5280 4.2.1.6 + RFC 822
    when:
      target: certificate.subjectAltName.rfc822Name
      operator: present
    target: certificate.subjectAltName.rfc822Name
    operator: regex
    operands: ["^[^@]+@[^@]+$"]
    severity: error
    message: "SAN rfc822Name must be valid RFC 822 email format"
    appliesTo: [leaf]

  # IAN rfc822Name format validation (RFC 822)
  - id: ian-rfc822-name-format
    reference: RFC5280 4.2.1.8 + RFC 822
    when:
      target: certificate.issuerAltName.rfc822Name
      operator: present
    target: certificate.issuerAltName.rfc822Name
    operator: regex
    operands: ["^[^@]+@[^@]+$"]
    severity: warning
    message: "IAN rfc822Name should be valid RFC 822 email format"
    appliesTo: [leaf, intermediate]

  # IAN dNSName must not contain wildcards (RFC 5280 4.2.1.6)
  - id: ian-no-wildcard-dns
    reference: RFC5280 4.2.1.8
    when:
      target: certificate.issuerAltName.dNSName
      operator: present
    target: certificate.issuerAltName.dNSName
    operator: notRegex
    operands: ["^\\*"]
    severity: warning
    message: "IAN dNSName should not contain wildcard"
    appliesTo: [leaf, intermediate]

  # IAN dNSName must be valid DNS label format (RFC 5280 + RFC 9549)
  - id: ian-dns-valid-label
    reference: RFC5280 4.2.1.8 + RFC 9549
    when:
      target: certificate.issuerAltName.dNSName
      operator: present
    target: certificate.issuerAltName.dNSName
    operator: componentRegex
    operands: ["^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$"]
    severity: warning
    message: "IAN dNSName components must be valid DNS labels"
    appliesTo: [leaf, intermediate]

  # IAN URI must use HTTP or HTTPS scheme (best practice)
  - id: ian-uri-http-scheme
    reference: RFC5280 4.2.1.8
    when:
      target: certificate.issuerAltName.uniformResourceIdentifier
      operator: present
    target: certificate.issuerAltName.uniformResourceIdentifier
    operator: regex
    operands: ["^https?://"]
    severity: warning
    message: "IAN URI should use HTTP or HTTPS scheme"
    appliesTo: [leaf, intermediate]

  # IAN must not contain internal names (RFC 5280 best practice)
  - id: ian-no-internal-names
    reference: RFC5280 4.2.1.8
    when:
      target: certificate.issuerAltName.dNSName
      operator: present
    target: certificate.issuerAltName.dNSName
    operator: componentTLDRegistered
    severity: warning
    message: "IAN dNSName should not contain internal names with unregistered TLDs"
    appliesTo: [leaf, intermediate]

  # ==================================================
  # URI Validation (RFC 5280 4.2.1.6)
  # ==================================================

  # SAN uniformResourceIdentifier must be valid HTTP/HTTPS URL
  - id: san-uri-http-scheme
    reference: RFC5280 4.2.1.6 + CABF BR
    when:
      target: certificate.subjectAltName.uniformResourceIdentifier
      operator: present
    target: certificate.subjectAltName.uniformResourceIdentifier
    operator: regex
    operands: ["^https?://"]
    severity: warning
    message: "SAN URI should use HTTP or HTTPS scheme"
    appliesTo: [leaf]

  # SAN URI must not contain fragment identifier
  - id: san-uri-no-fragment
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subjectAltName.uniformResourceIdentifier
      operator: present
    target: certificate.subjectAltName.uniformResourceIdentifier
    operator: notRegex
    operands: ["#"]
    severity: warning
    message: "SAN URI should not contain fragment identifier"
    appliesTo: [leaf]

  # SAN URI max length (reasonable limit)
  - id: san-uri-max-length
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subjectAltName.uniformResourceIdentifier
      operator: present
    target: certificate.subjectAltName.uniformResourceIdentifier
    operator: maxLength
    operands: [1024]
    severity: warning
    message: "SAN URI should not exceed 1024 characters"
    appliesTo: [leaf]

  # domainComponent max 63 characters per label (DNS label limit)
  - id: subject-dc-label-max-length
    reference: RFC5280 + RFC 5890
    when:
      target: certificate.subject.domainComponent
      operator: present
    target: certificate.subject.domainComponent
    operator: componentMaxLength
    operands: [63, "."]
    severity: error
    message: "Each domainComponent label must not exceed 63 characters"
    appliesTo: [leaf, intermediate]

  # -------------------------------------------------
  # Time Format Validation (RFC 5280 4.1.2.5)
  # -------------------------------------------------

  # UTCTime format: YYMMDDHHMMSSZ per RFC 5280 4.1.2.5.1
  # UTCTime MUST have seconds present (even if 00)
  - id: validity-utctime-has-seconds
    reference: RFC5280 4.1.2.5.1
    when:
      target: certificate.validity.notBefore.isUTC
      operator: eq
      operands: [true]
    target: certificate.validity.notBefore
    operator: utctimeHasSeconds
    severity: error
    message: "UTCTime MUST include seconds per RFC 5280 4.1.2.5.1"
    appliesTo: [leaf, intermediate, root]

  - id: validity-utctime-has-seconds-notafter
    reference: RFC5280 4.1.2.5.1
    when:
      target: certificate.validity.notAfter.isUTC
      operator: eq
      operands: [true]
    target: certificate.validity.notAfter
    operator: utctimeHasSeconds
    severity: error
    message: "UTCTime MUST include seconds per RFC 5280 4.1.2.5.1"
    appliesTo: [leaf, intermediate, root]

  # UTCTime MUST end with 'Z' (Zulu time indicator)
  - id: validity-utctime-has-zulu-notbefore
    reference: RFC5280 4.1.2.5.1
    when:
      target: certificate.validity.notBefore.isUTC
      operator: eq
      operands: [true]
    target: certificate.validity.notBefore
    operator: utctimeHasZulu
    severity: error
    message: "UTCTime MUST end with 'Z' (Zulu indicator) per RFC 5280 4.1.2.5.1"
    appliesTo: [leaf, intermediate, root]

  - id: validity-utctime-has-zulu-notafter
    reference: RFC5280 4.1.2.5.1
    when:
      target: certificate.validity.notAfter.isUTC
      operator: eq
      operands: [true]
    target: certificate.validity.notAfter
    operator: utctimeHasZulu
    severity: error
    message: "UTCTime MUST end with 'Z' (Zulu indicator) per RFC 5280 4.1.2.5.1"
    appliesTo: [leaf, intermediate, root]

  # GeneralizedTime MUST end with 'Z'
  - id: validity-generalizedtime-has-zulu-notbefore
    reference: RFC5280 4.1.2.5.2
    when:
      target: certificate.validity.notBefore.isUTC
      operator: eq
      operands: [false]
    target: certificate.validity.notBefore
    operator: generalizedTimeHasZulu
    severity: error
    message: "GeneralizedTime MUST end with 'Z' per RFC 5280 4.1.2.5.2"
    appliesTo: [leaf, intermediate, root]

  - id: validity-generalizedtime-has-zulu-notafter
    reference: RFC5280 4.1.2.5.2
    when:
      target: certificate.validity.notAfter.isUTC
      operator: eq
      operands: [false]
    target: certificate.validity.notAfter
    operator: generalizedTimeHasZulu
    severity: error
    message: "GeneralizedTime MUST end with 'Z' per RFC 5280 4.1.2.5.2"
    appliesTo: [leaf, intermediate, root]

  # GeneralizedTime should not have fractional seconds (recommended)
  - id: validity-generalizedtime-no-fraction
    reference: RFC5280 4.1.2.5.2
    when:
      target: certificate.validity.notBefore.isUTC
      operator: eq
      operands: [false]
    target: certificate.validity.notBefore
    operator: generalizedTimeNoFraction
    severity: warning
    message: "GeneralizedTime SHOULD NOT include fractional seconds per RFC 5280"
    appliesTo: [leaf, intermediate, root]

  - id: validity-generalizedtime-no-fraction-notafter
    reference: RFC5280 4.1.2.5.2
    when:
      target: certificate.validity.notAfter.isUTC
      operator: eq
      operands: [false]
    target: certificate.validity.notAfter
    operator: generalizedTimeNoFraction
    severity: warning
    message: "GeneralizedTime SHOULD NOT include fractional seconds per RFC 5280"
    appliesTo: [leaf, intermediate, root]

  # -------------------------------------------------
  # Encoding Validation (ASN.1 String Types)
  # -------------------------------------------------

  # Country name MUST use PrintableString encoding (per RFC 5280 Appendix A.1)
  # PrintableString allows: A-Z, 0-9, space, and specific special chars
  - id: subject-country-printable-string
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.countryName
      operator: present
    target: certificate.subject.countryName
    operator: validPrintableString
    severity: warning
    message: "countryName should use PrintableString compatible characters"
    appliesTo: [leaf, intermediate]

  # Common name should use PrintableString or UTF8String for legacy compatibility
  - id: subject-cn-valid-encoding
    reference: RFC5280 Appendix A.1
    when:
      target: certificate.subject.commonName
      operator: present
    target: certificate.subject.commonName
    operator: validIA5String
    severity: warning
    message: "commonName should use IA5String compatible characters (ASCII)"
    appliesTo: [leaf]

  # Organization name should use PrintableString or UTF8String
  # Note: BR 7.1.4.2 permits both UTF8String and PrintableString encoding for
# organizationName, stateOrProvinceName, localityName. No content check needed.
# UTF8String can contain any Unicode characters; PrintableString content check
# only applies if the encoding tag is PrintableString (requires parser enhancement).

  # DNS names in SAN must be IA5String (ASCII)
  - id: san-dnsname-valid-ia5string
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subjectAltName.dNSName
      operator: present
    target: certificate.subjectAltName.dNSName
    operator: validIA5String
    severity: error
    message: "DNS names in SAN must use IA5String encoding (ASCII only)"
    appliesTo: [leaf]

  # URIs in SAN must be IA5String (ASCII)
  - id: san-uri-valid-ia5string
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subjectAltName.uniformResourceIdentifier
      operator: present
    target: certificate.subjectAltName.uniformResourceIdentifier
    operator: validIA5String
    severity: error
    message: "URIs in SAN must use IA5String encoding (ASCII only)"
    appliesTo: [leaf]

  # Email addresses must be IA5String (ASCII)
  - id: san-email-valid-ia5string
    reference: RFC5280 4.2.1.6
    when:
      target: certificate.subjectAltName.rfc822Name
      operator: present
    target: certificate.subjectAltName.rfc822Name
    operator: validIA5String
    severity: error
    message: "Email addresses in SAN must use IA5String encoding (ASCII only)"
    appliesTo: [leaf]
